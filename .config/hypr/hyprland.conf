# ── monitor ────────────────────────────────────────────────
monitor=,1920x1080,auto,1

# ── autostart ──────────────────────────────────────────────
exec-once = waybar

# ── input ──────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
}

# ── general ────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(d4847aff)
    col.inactive_border = rgba(3d3330aa)
    layout = dwindle
}

# ── decoration ─────────────────────────────────────────────
decoration {
    rounding = 10

    active_opacity   = 1.0
    inactive_opacity = 0.9

    blur {
        enabled = true
        size = 8
        passes = 3
        # FIX 1: removed deprecated `new_optimizations` (removed in Hyprland 0.40+)
        noise = 0.02
        contrast = 1.0
        brightness = 0.9
    }

    # FIX 2: shadow options moved into shadow {} sub-block (required since Hyprland 0.45)
    # OLD (broken):
    #   drop_shadow = true
    #   shadow_range = 12
    #   shadow_render_power = 3
    #   col.shadow = rgba(1a1a2eee)
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(1a1a2eee)
    }
}

# ── blur kitty specifically ────────────────────────────────
windowrulev2 = opacity 0.75 0.75, class:^(kitty)$
windowrulev2 = blur, class:^(kitty)$

# ── animations ─────────────────────────────────────────────
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

# ── keybinds ───────────────────────────────────────────────
$mod = SUPER

bind = $mod, Return,    exec, kitty
bind = $mod, Q,         killactive
bind = $mod, F,         exec, firefox
bind = $mod, M,         exit
bind = $mod, V,         togglefloating
bind = $mod, 1,         workspace, 1
bind = $mod, 2,         workspace, 2
bind = $mod, 3,         workspace, 3
bind = $mod, 4,         workspace, 4

# move windows to workspaces
bind = $mod SHIFT, 1,   movetoworkspace, 1
bind = $mod SHIFT, 2,   movetoworkspace, 2
bind = $mod SHIFT, 3,   movetoworkspace, 3
bind = $mod SHIFT, 4,   movetoworkspace, 4

# move focus with arrow keys
bind = $mod, left,      movefocus, l
bind = $mod, right,     movefocus, r
bind = $mod, up,        movefocus, u
bind = $mod, down,      movefocus, d

# resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
